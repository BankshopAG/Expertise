<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Meine FinanzCloud</title>
<!--
  MEINE FINANZDNA — eigenständige Seite, einfach im Browser öffnen.
  Marke: Bankshop (Dachmarke) · Produkt "Meine FinanzDNA" -> führt in "Meine FinanzCloud".

  HINWEISE FÜR EURE PROGRAMMIERER
  - Alle Daten leben nur im Browser (Variable `state`). Keine Persistenz, kein Tracking.
  - Es werden bewusst nur grobe Angaben über Regler erfasst: kein exaktes Einkommen, keine Steuer-ID.
  - Datenübergabe: NUR die Funktion submitToSchnittstelle(payload). Hier eure echte
    Schnittstelle (CRM / FinanzCloud) anbinden. Aktuell nur simuliert (console.log).
  - KI-Auswertung: versucht die Anthropic-API; in PRODUKTION den Key NICHT ins Frontend
    legen, sondern über euer Backend proxen. Bei Fehler greift ein regelbasierter Fallback.
  - Bonusbeträge zentral in BONUS_CONFIG konfigurierbar.
  - Berechnungen bewusst einfach & transparent ("grobe Schätzung", Annahmen sichtbar). Keine Beratung.
-->
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap');
:root{
  --ink:#0a142e; --ocean:#122a63; --cloud:#2e9bf0; --pulse:#3fe0c7;
  --gold:#f6b43c; --paper:#eef4fb; --line:rgba(255,255,255,.12);
  --txt:#eaf1fb; --muted:#9fb3d6; --warn:#ff9b6a;
}
*{box-sizing:border-box;}
html,body{margin:0; min-height:100%;}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif; color:var(--txt);
  -webkit-font-smoothing:antialiased;
  background:
    radial-gradient(120% 80% at 80% -10%, rgba(63,224,199,.16), transparent 60%),
    radial-gradient(120% 80% at -10% 110%, rgba(46,155,240,.20), transparent 55%),
    linear-gradient(180deg,#0a142e 0%, #0b1a3f 100%);
  background-attachment:fixed;
}
.wrap{max-width:520px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; padding:0 18px 32px;}
h1,h2,h3{font-family:'Space Grotesk',sans-serif; font-weight:700; line-height:1.08; letter-spacing:-.01em; margin:0;}
p{margin:0; color:var(--muted); line-height:1.5;}
.num{font-family:'Space Grotesk',sans-serif; font-variant-numeric:tabular-nums;}

/* Kopf / DNA-Strang */
.top{position:sticky; top:0; z-index:5; padding:16px 0 12px;
  background:linear-gradient(180deg,rgba(10,20,46,.96),rgba(10,20,46,.6) 70%,transparent); backdrop-filter:blur(6px);}
.brand{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;}
.brand .logo{font-family:'Space Grotesk'; font-weight:700; font-size:15px; letter-spacing:.02em;}
.brand .logo b{color:var(--cloud);} .brand .logo i{font-style:normal; color:var(--pulse);}
.pts{font-family:'Space Grotesk'; font-weight:600; font-size:13px; color:var(--pulse);
  background:rgba(63,224,199,.1); border:1px solid rgba(63,224,199,.3); padding:5px 10px; border-radius:999px;}
.strand{display:flex; align-items:center; gap:6px;}
.seg{flex:1; height:4px; border-radius:99px; background:rgba(255,255,255,.1);}
.seg.on{background:linear-gradient(90deg,var(--cloud),var(--pulse));}
.node{width:9px; height:9px; border-radius:50%; background:rgba(255,255,255,.18); flex:0 0 auto; transition:all .4s;}
.node.on{background:var(--pulse); box-shadow:0 0 0 3px rgba(63,224,199,.18),0 0 12px rgba(63,224,199,.6);}
.node.cur{background:var(--cloud); box-shadow:0 0 0 4px rgba(46,155,240,.25);}

/* Screen */
.screen{flex:1; display:flex; flex-direction:column; justify-content:center; padding:8px 0 4px; animation:slideIn .45s cubic-bezier(.2,.7,.2,1);}
@keyframes slideIn{from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:none;}}
.eyebrow{font-family:'Space Grotesk'; font-weight:600; font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:var(--pulse); margin-bottom:10px;}
.lead{font-size:15px; color:var(--muted); margin-top:10px;}
.card{background:rgba(255,255,255,.045); border:1px solid var(--line); border-radius:18px; padding:18px; margin-top:16px;}

/* Buttons */
.btn{font-family:'Space Grotesk'; font-weight:600; font-size:16px; border:0; cursor:pointer; width:100%;
  padding:15px 18px; border-radius:14px; color:#06122c; background:linear-gradient(90deg,var(--pulse),var(--cloud)); transition:transform .12s, filter .2s;}
.btn:hover{filter:brightness(1.06);} .btn:active{transform:scale(.985);}
.btn.ghost{background:transparent; color:var(--txt); border:1px solid var(--line);}
.btn.gold{background:linear-gradient(90deg,#ffd27a,var(--gold)); color:#3a2600;}
.btn:disabled{opacity:.45; cursor:not-allowed;}
.btnrow{display:flex; gap:10px; margin-top:16px;}
.back{background:none;border:0;color:var(--muted);font-size:13px;cursor:pointer;padding:10px 0;font-family:'Inter';width:100%;}
.back:hover{color:var(--txt);}

/* Slider */
.field{margin:18px 0;}
.field .lab{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px;}
.field .lab span{font-size:14px; color:var(--txt);}
.field .lab .val{font-family:'Space Grotesk'; font-weight:700; font-size:18px; color:var(--pulse);}
input[type=range]{-webkit-appearance:none; appearance:none; width:100%; height:6px; border-radius:99px; background:rgba(255,255,255,.14); outline:none; margin:0;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none; width:24px; height:24px; border-radius:50%; background:#fff; border:5px solid var(--cloud); box-shadow:0 2px 10px rgba(0,0,0,.4); cursor:pointer;}
input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#fff;border:5px solid var(--cloud);cursor:pointer;}
input[type=text],input[type=email],input[type=tel]{width:100%; background:rgba(255,255,255,.06); border:1px solid var(--line); border-radius:12px; padding:13px 14px; color:var(--txt); font-size:15px; font-family:'Inter';}
input::placeholder{color:#6f82a8;}
input:focus{outline:2px solid var(--cloud); outline-offset:1px;}

/* Choices */
.choices{display:grid; gap:9px; margin-top:6px;}
.choices.two{grid-template-columns:1fr 1fr;}
.chip{font-family:'Inter'; text-align:left; background:rgba(255,255,255,.05); border:1px solid var(--line); border-radius:12px; padding:13px 15px; color:var(--txt); font-size:14.5px; cursor:pointer; transition:.15s;}
.chip:hover{border-color:rgba(63,224,199,.5);}
.chip.sel{background:rgba(63,224,199,.13); border-color:var(--pulse); color:#fff;}

/* Ergebnis */
.res{margin-top:18px; background:rgba(46,155,240,.08); border:1px solid rgba(46,155,240,.25); border-radius:16px; padding:16px;}
.res .rh{font-family:'Space Grotesk'; font-weight:600; font-size:12px; letter-spacing:.12em; text-transform:uppercase; color:var(--cloud); margin-bottom:12px;}
.stat{display:flex; justify-content:space-between; align-items:baseline; padding:9px 0; border-bottom:1px solid rgba(255,255,255,.07);}
.stat:last-child{border-bottom:0;}
.stat .k{font-size:13.5px; color:var(--muted); max-width:62%;}
.stat .v{font-family:'Space Grotesk'; font-weight:700; font-size:18px; color:var(--txt); text-align:right;}
.stat .v.warn{color:var(--warn);}
.assume{font-size:11.5px; color:#7286ac; margin-top:12px; line-height:1.5;}
.ptsgain{margin-top:14px; text-align:center; font-family:'Space Grotesk'; font-weight:600; color:var(--pulse); font-size:15px;}

/* Auswertung */
.ring{display:block; margin:6px auto 4px;}
.ringlabel{text-align:center; margin-bottom:8px;}
.ringlabel .big{font-family:'Space Grotesk'; font-weight:700; font-size:13px; letter-spacing:.1em; text-transform:uppercase; color:var(--pulse);}
.bar{margin:13px 0;}
.bar .bl{display:flex; justify-content:space-between; font-size:13.5px; margin-bottom:6px;}
.bar .bl b{font-family:'Space Grotesk'; color:var(--txt);}
.track{height:9px; border-radius:99px; background:rgba(255,255,255,.1); overflow:hidden;}
.fill{height:100%; border-radius:99px; background:linear-gradient(90deg,var(--cloud),var(--pulse)); width:0; transition:width 1s cubic-bezier(.2,.8,.2,1);}
.fill.low{background:linear-gradient(90deg,#ff7a59,var(--gold));}
.compare{text-align:center; margin-top:20px; font-size:14.5px; color:var(--txt);}
.compare b{font-family:'Space Grotesk'; color:var(--pulse); font-size:17px;}
.typ{text-align:center; font-family:'Space Grotesk'; font-weight:700; font-size:24px; margin:4px 0 2px;
  background:linear-gradient(90deg,var(--pulse),var(--cloud)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;}

/* KI */
.ki{white-space:pre-wrap; font-size:14.5px; line-height:1.6; color:var(--txt);}
.spin{width:22px;height:22px;border:3px solid rgba(255,255,255,.2);border-top-color:var(--pulse);border-radius:50%;animation:spin 1s linear infinite;display:inline-block;vertical-align:middle;margin-right:10px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Bonus */
.bonusbar{height:16px; border-radius:99px; background:rgba(255,255,255,.1); overflow:hidden; margin:10px 0;}
.bonusfill{height:100%; background:linear-gradient(90deg,#ffd27a,var(--gold)); transition:width .8s cubic-bezier(.2,.8,.2,1);}
.bonusval{text-align:center; font-family:'Space Grotesk'; font-weight:700; font-size:34px; color:var(--gold);}
.row{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:13px 0; border-bottom:1px solid rgba(255,255,255,.08);}
.row:last-child{border-bottom:0;}
.row .rl{font-size:14px;} .row .ra{font-family:'Space Grotesk'; font-weight:600; color:var(--gold); font-size:14px;}
.mini{font-family:'Space Grotesk'; font-weight:600; font-size:13px; padding:8px 14px; border-radius:10px; border:1px solid var(--pulse); background:rgba(63,224,199,.12); color:var(--pulse); cursor:pointer; white-space:nowrap;}
.mini.done{border-color:rgba(255,255,255,.15); background:rgba(255,255,255,.06); color:var(--muted); cursor:default;}
.sublabel{font-family:'Space Grotesk'; font-size:12px; letter-spacing:.12em; text-transform:uppercase; color:var(--cloud); margin-bottom:4px;}

.foot{text-align:center; font-size:11px; color:#5f7197; margin-top:24px; line-height:1.5;}
.toast{position:fixed; left:50%; bottom:24px; transform:translateX(-50%); z-index:30; background:#06122c; border:1px solid var(--pulse); color:var(--txt); padding:12px 18px; border-radius:12px; font-size:14px; box-shadow:0 10px 40px rgba(0,0,0,.5); animation:slideIn .3s;}

@media (prefers-reduced-motion: reduce){ *{animation:none!important; transition:none!important;} }
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<div id="toast-host"></div>

<script>
"use strict";

/* ===================== KONFIGURATION ===================== */
const BONUS_CONFIG = {
  start: 100,            // eigenes Startguthaben bei FinanzCloud-Einrichtung (echtes Geld)
  friendGets: 100,       // Startguthaben für den/die Eingeladene:n
  maxInvites: 5,         // zählbare Empfehlungen
  // Gestaffelter Empfehlungs-Bonus: erreichte Stufe zählt (einstufig)
  tiers: [ {n:1, amount:50}, {n:3, amount:250}, {n:5, amount:500} ],
  maxBonus: 500,
  // Eigene Sofort-Boni (zusätzlich, sofort ausgezahlt)
  actions: [
    { id: "giro", label: "Kostenloses Girokonto eröffnen", amount: 50, url: "https://www.procheck24.de/einsurance/csp/doHomepageEntry.do?cspident=D380639C061EA86621F1DEA20571D531&p=3" },
    { id: "gkv", label: "In eine günstigere Krankenkasse wechseln", amount: 100, url: "https://www.kassensucheservice.de/index.php?m=2001302&iframe=false&hint=false&untervermittler=0" },
    { id: "kreditkarte", label: "Kostenlose Kreditkarte sichern", amount: 50, url: "https://www.procheck24.de/einsurance/csp/doHomepageEntry.do?cspident=D380639C061EA86621F1DEA20571D531&p=1" },
  ],
};
const RETIRE_AGE = 67;
const PAYOUT_YEARS = 20;
const RENTE_ZINS = 0.03; // Verzinsung von vorhandenem Kapital und Sparbeitrag bis zur Rente

const STEPS = ["intro","basis","rente","eigentum","vermoegen","familie","absicherung","auswertung","steuer","lead","cloud","ki","termin","empfehlung"];
const LEVELS = ["rente","eigentum","vermoegen","familie","absicherung"];
const LABELS = { rente:"Rente", eigentum:"Eigentum", vermoegen:"Vermögen", familie:"Familie", absicherung:"Absicherung" };

/* ===================== STATE ===================== */
const state = {
  step: "intro",
  prio: { rente:3, eigentum:3, vermoegen:3, familie:3, absicherung:3, steuern:3 },
  alter:38, alterPartner:38, haushalt:"paar", kinder:1, wohnstatus:"miete",
  netto:2800, nettoSelf:1600, nettoPartner:1200, miete:950, vermoegen:15000, freiBudget:300, selbststaendig:"nein",
  erwProzent:48, zielNiveau:90, vorhandeneRente:0, vorhandenKapital:0,
  wunsch:"eigennutzung", zusatzBudget:250, eigenkapital:20000,
  anlageform:"etf", sparbetrag:250, laufzeit:20, rendite:6,
  kindAlter:6, zielAlter:18, zielKapital:25000, startKapital:1000, familienBudget:75,
  absVorhanden:false, absVorhandenPartner:false,
  allocTotal:300, allocBasis:100, allocEtf:100, allocTagesgeld:50, allocGold:25, allocImmo:25,
  anlageTyp:"lv", anlageBeitrag:100, anlageJahre:25, anlageAblauf:45000,
  autos:null, autoLocked:true,
  nebenJa:false, nebenSel:null,
  cloudOn:false, actionsDone:{}, invites:0,
  docs:[], docConsent:false,
  termin:{ thema:"", kanal:"", datum:"", slot:"", bestaetigt:false },
  pKunden:1, pPartner1:2, pPartner2:3, pProdPartner:1,
  lead:{ name:"", email:"", tel:"", einw:false },
  kiText:"", kiLoading:false,
};

/* ===================== HELFER ===================== */
const clamp = (v,lo,hi)=>Math.max(lo,Math.min(hi,v));
const eur = n => (isFinite(n)?Math.round(n):0).toLocaleString("de-DE")+" €";
const eurK = n => n>=100000 ? Math.round(n/1000).toLocaleString("de-DE")+" Tsd. €" : eur(n);
function fvAnnuity(pmt,annualPct,years){ const r=annualPct/100/12, n=years*12; return r===0?pmt*n:pmt*((Math.pow(1+r,n)-1)/r); }
function pmtForTarget(target,annualPct,years){ const r=annualPct/100/12, n=years*12; return r===0?target/n:(target*r)/(Math.pow(1+r,n)-1); }

function h(tag, props, children){
  const e=document.createElement(tag);
  if(props) for(const k in props){
    const val=props[k];
    if(val==null) continue;
    if(k==="class") e.className=val;
    else if(k==="html") e.innerHTML=val;
    else if(k==="style") e.setAttribute("style",val);
    else if(k.slice(0,2)==="on" && typeof val==="function") e.addEventListener(k.slice(2).toLowerCase(),val);
    else e.setAttribute(k,val);
  }
  (children||[]).forEach(c=>{ if(c==null||c===false) return; e.appendChild(typeof c==="object"?c:document.createTextNode(String(c))); });
  return e;
}
function toast(msg){
  const host=document.getElementById("toast-host");
  host.innerHTML="";
  host.appendChild(h("div",{class:"toast"},[msg]));
  setTimeout(()=>{ host.innerHTML=""; }, 2200);
}

/* ===================== BERECHNUNGEN ===================== */
function calc(){
  const d=state;
  const netto = d.haushalt==="paar" ? (Number(d.nettoSelf)+Number(d.nettoPartner)) : Number(d.netto);
  const paar = d.haushalt==="paar";
  const nettoA = paar ? Number(d.nettoSelf) : Number(d.netto);
  const nettoB = paar ? Number(d.nettoPartner) : 0;
  const jahreBisRente=Math.max(0,RETIRE_AGE-d.alter);
  const jahreBisRenteB = paar ? Math.max(0,RETIRE_AGE-d.alterPartner) : 0;
  const gapPctMonatlich = Math.max(0, d.zielNiveau-d.erwProzent)/100;
  const lueckeA = nettoA*gapPctMonatlich;
  const lueckeB = paar ? nettoB*gapPctMonatlich : 0;
  const zielRente=netto*d.zielNiveau/100;
  const gesetzl=netto*d.erwProzent/100;
  const renteGedeckt=gesetzl;
  const renteLuecke=lueckeA+lueckeB;
  const renteKapital=renteLuecke*12*PAYOUT_YEARS;
  const kapitalZukunft=Math.round(Number(d.vorhandenKapital)*Math.pow(1+RENTE_ZINS,jahreBisRente) + fvAnnuity(Number(d.vorhandeneRente),RENTE_ZINS*100,jahreBisRente));
  const renteRest=Math.max(0,renteKapital-kapitalZukunft);
  const fvFaktor=fvAnnuity(1,RENTE_ZINS*100,jahreBisRente);
  const noetigerSparbeitrag=(renteRest>0&&fvFaktor>0)?Math.round(renteRest/fvFaktor):0;
  const grenzFor = n => n<2500?0.30:(n<4500?0.35:0.42);
  const basisBeitragA = nettoA*12*0.10, basisBeitragB = paar ? nettoB*12*0.10 : 0;
  const basisSteuerA = Math.round(basisBeitragA*grenzFor(nettoA));
  const basisSteuerB = Math.round(basisBeitragB*grenzFor(nettoB));
  const basisSteuer = basisSteuerA + basisSteuerB;
  const basisBeitrag = Math.round((basisBeitragA+basisBeitragB)/12);

  const kapitalMode=(d.wohnstatus!=="miete")||(d.wunsch==="kapitalanlage");
  const rate=kapitalMode?d.zusatzBudget:(d.miete+d.zusatzBudget);
  const grenzSteuer = grenzFor(netto);
  const annuitaet=0.045, mietRendite=0.045;
  let darlehen, immoRahmen;
  if(kapitalMode){
    // 80 % der Miete + monatlicher Eigenanteil bedienen die Annuität; Miete = Rendite auf den Objektwert
    const nenner=annuitaet-0.8*mietRendite;
    darlehen=Math.max(0,(0.8*mietRendite*d.eigenkapital + 12*d.zusatzBudget)/(nenner>0?nenner:1));
    immoRahmen=darlehen+d.eigenkapital;
  } else {
    darlehen=rate*12/annuitaet;
    immoRahmen=darlehen+d.eigenkapital;
  }

  const zielVermoegen=fvAnnuity(d.sparbetrag,d.rendite,d.laufzeit);
  const eingezahlt=d.sparbetrag*12*d.laufzeit;
  const ertrag=Math.max(0,zielVermoegen-eingezahlt);

  const kindJahre=Math.max(1,d.zielAlter-d.kindAlter);
  const startGrown=d.startKapital*Math.pow(1.03,kindJahre);
  const familieZiel=Math.max(0,d.zielKapital-startGrown);
  const familieRate=pmtForTarget(familieZiel,3,kindJahre);

  const arbeitskraftA = nettoA*12*jahreBisRente;
  const arbeitskraftB = paar ? nettoB*12*jahreBisRenteB : 0;
  const arbeitskraft = arbeitskraftA + arbeitskraftB;
  const ruecklagenMonate=netto>0?d.vermoegen/netto:0;

  const annualNet=netto*12;
  const covRente=renteLuecke<=0?100:clamp(kapitalZukunft/Math.max(1,renteKapital)*100,0,100);
  const ekQuote = kapitalMode ? 0.10 : 0.15; // Kapitalanlage 10 %, Eigennutzung 15 %
  const covEigentum = d.wohnstatus==="eigentum_frei" ? 100
    : d.wohnstatus==="eigentum_kredit" ? clamp(70+(d.eigenkapital/Math.max(1,ekQuote*immoRahmen))*15,0,100)
    : clamp(d.eigenkapital/Math.max(1,ekQuote*immoRahmen)*100,0,100);
  const covVermoegen=clamp(d.vermoegen/Math.max(1,annualNet)*100,0,100);
  const familieReached=startGrown+fvAnnuity(d.familienBudget,3,kindJahre);
  const covFamilie=d.kinder===0?100:clamp(familieReached/Math.max(1,d.zielKapital)*100,0,100);
  const insuredN=(d.absVorhanden?1:0)+(paar?(d.absVorhandenPartner?1:0):0), denomA=paar?2:1;
  const covAbs=clamp((insuredN/denomA)*70+Math.min(ruecklagenMonate,6)/6*30,0,100);
  const covSteuern = d.selbststaendig==="haupt"?70:(d.selbststaendig==="nebenbei"?50:20);
  const cov={ rente:covRente, eigentum:covEigentum, vermoegen:covVermoegen, familie:covFamilie, absicherung:covAbs, steuern:covSteuern };
  const scores={ rente:Math.round(covRente), eigentum:Math.round(covEigentum), vermoegen:Math.round(covVermoegen), familie:Math.round(covFamilie), absicherung:Math.round(covAbs) };
  const total=Object.values(scores).reduce((a,b)=>a+b,0);
  const pct=Math.round(clamp(100/(1+Math.exp(-(total-255)/60)),5,96));

  const TYP_NAMES={ rente:"Vorsorge-Typ", eigentum:"Immobilien-Typ", vermoegen:"Vermögensaufbauer", familie:"Familienmensch", absicherung:"Sicherheits-Typ", steuern:"Steuer-Optimierer" };
  const prioTop=Object.keys(d.prio).reduce((a,b)=>d.prio[b]>d.prio[a]?b:a, "rente");
  const finanztyp=TYP_NAMES[prioTop];
  const best=LEVELS.reduce((a,b)=>scores[b]>scores[a]?b:a);
  const worst=LEVELS.reduce((a,b)=>scores[b]<scores[a]?b:a);

  return { netto,cov,grenzSteuer,kapitalMode,ekQuote,kapitalZukunft,renteRest,noetigerSparbeitrag,jahreBisRente,jahreBisRenteB,lueckeA,lueckeB,zielRente,gesetzl,renteLuecke,renteKapital,basisSteuer,basisBeitrag,
    rate,darlehen,immoRahmen,zielVermoegen,eingezahlt,ertrag,
    familieRate,familieReached,kindJahre,arbeitskraft,arbeitskraftA,arbeitskraftB,ruecklagenMonate,
    scores,total,pct,finanztyp,best,worst };
}

/* ===================== KI-AUSWERTUNG ===================== */
async function runKi(){
  state.kiLoading=true; state.kiText=""; render();
  const c=calc();
  const profil={ finanztyp:c.finanztyp, alter:state.alter, alterPartner:(state.haushalt==="paar"?state.alterPartner:null), haushalt:state.haushalt, kinder:state.kinder,
    gesamtpunkte:c.total, scores:c.scores, staerkster:LABELS[c.best], groessteLuecke:LABELS[c.worst],
    renteLueckeMonat:Math.round(c.renteLuecke), immobilienRahmen:Math.round(c.immoRahmen), zielVermoegen:Math.round(c.zielVermoegen) };
  const prompt='Du bist ein freundlicher, seriöser Finanz-Assistent für "Meine FinanzDNA". Erstelle eine kurze, persönliche Auswertung auf Deutsch (Sie-Form), warm und motivierend, ohne konkrete Produkte zu verkaufen und ohne Heilsversprechen. KEIN Markdown, keine Sternchen. Genau vier Abschnitte, jeweils Überschrift in Großbuchstaben gefolgt von 1-2 Sätzen, getrennt durch eine Leerzeile:\n\nZUSAMMENFASSUNG\nSTÄRKSTER BEREICH\nGRÖSSTE LÜCKE\nNÄCHSTER SCHRITT\n\nProfil (grobe Selbsteinschätzung): '+JSON.stringify(profil);

  const fallback = "ZUSAMMENFASSUNG\nIhre FinanzDNA erreicht "+c.total+" von 500 Punkten – eine solide Grundlage mit klarem Entwicklungspotenzial.\n\nSTÄRKSTER BEREICH\n"+LABELS[c.best]+": Hier sind Sie bereits gut aufgestellt. Diese Stärke lässt sich gezielt ausbauen.\n\nGRÖSSTE LÜCKE\n"+LABELS[c.worst]+": Hier liegt aktuell Ihr größtes ungenutztes Potenzial"+((c.renteLuecke>0&&c.worst==="rente")?(" – rechnerisch fehlen rund "+eur(c.renteLuecke)+" pro Monat im Ruhestand"):"")+".\n\nNÄCHSTER SCHRITT\nSichern Sie Ihre FinanzDNA in der FinanzCloud und besprechen Sie die größte Lücke in einem kostenlosen Strategie-Termin.";

  try{
    const ctrl = new AbortController();
    const timer = setTimeout(()=>ctrl.abort(), 12000);
    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST", headers:{ "Content-Type":"application/json" }, signal:ctrl.signal,
      body: JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:1000, messages:[{role:"user",content:prompt}] })
    });
    clearTimeout(timer);
    const data=await res.json();
    const text=(data.content||[]).map(x=>x.text||"").join("\n").trim();
    state.kiText = text || fallback;
  }catch(e){
    state.kiText = fallback;
  }finally{
    state.kiLoading=false; render();
  }
}

/* ===================== NAVIGATION ===================== */
function go(step){ state.step=step; render(); window.scrollTo({top:0,behavior:"smooth"}); if(step==="ki") runKi(); }
function idx(){ return STEPS.indexOf(state.step); }
function next(){ go(STEPS[Math.min(STEPS.length-1, idx()+1)]); }
function prev(){ go(STEPS[Math.max(0, idx()-1)]); }
function levelDone(){ return LEVELS.filter(l=>idx()>STEPS.indexOf(l)); }
function points(){ const c=calc(); return levelDone().reduce((a,l)=>a+c.scores[l],0); }
function referralBonus(){
  if(!state.cloudOn) return 0;
  let b=0; BONUS_CONFIG.tiers.forEach(t=>{ if(state.invites>=t.n) b=t.amount; }); return b;
}
function selfBonus(){
  let b=0; BONUS_CONFIG.actions.forEach(a=>{ if(state.actionsDone[a.id]) b+=a.amount; }); return b;
}
function nextTierText(){
  if(!state.cloudOn) return "Zuerst FinanzCloud einrichten – dann zählt jede Referenz.";
  const next=BONUS_CONFIG.tiers.find(t=>state.invites<t.n);
  if(next){ const r=next.n-state.invites; return "Noch "+r+" "+(r===1?"Referenz":"Referenzen")+" bis "+eur(next.amount)+"."; }
  return "Höchste Stufe erreicht – "+eur(BONUS_CONFIG.maxBonus)+" gesichert.";
}

/* ===================== BAUSTEINE ===================== */
function slider(label,key,min,max,step,fmt,oninput){
  const valSpan=h("span",{class:"val"});
  const setLbl=v=>valSpan.textContent=fmt?fmt(v):v;
  setLbl(state[key]);
  const input=h("input",{type:"range",min:min,max:max,step:step||1});
  input.value=state[key];
  input.addEventListener("input",()=>{ state[key]=Number(input.value); setLbl(state[key]); if(oninput) oninput(); });
  return h("div",{class:"field"},[ h("div",{class:"lab"},[ h("span",null,[label]), valSpan ]), input ]);
}
function prioSlider(label,key){
  const words=["unwichtig","eher gering","neutral","wichtig","sehr wichtig"];
  const valSpan=h("span",{class:"val"});
  valSpan.textContent=words[state.prio[key]-1];
  const input=h("input",{type:"range",min:1,max:5,step:1});
  input.value=state.prio[key];
  input.addEventListener("input",()=>{ state.prio[key]=Number(input.value); valSpan.textContent=words[state.prio[key]-1]; });
  return h("div",{class:"field"},[ h("div",{class:"lab"},[ h("span",null,[label]), valSpan ]), input ]);
}
function choices(key,options,two,onchange){
  const wrap=h("div",{class:"choices"+(two?" two":"")});
  options.forEach(o=>{
    const b=h("button",{class:"chip"+(state[key]===o.v?" sel":"")},[o.l]);
    b.addEventListener("click",()=>{ state[key]=o.v; Array.from(wrap.children).forEach((c,i)=>c.classList.toggle("sel",options[i].v===o.v)); if(onchange) onchange(); });
    wrap.appendChild(b);
  });
  return wrap;
}
function statRow(k,v,warn){ return '<div class="stat"><div class="k">'+k+'</div><div class="v'+(warn?' warn':'')+'">'+v+'</div></div>'; }

function header(){
  const done=levelDone();
  const strand=h("div",{class:"strand"});
  LEVELS.forEach((l,i)=>{
    if(i>0){ const segOn = done.includes(LEVELS[i-1]); strand.appendChild(h("div",{class:"seg"+(segOn?" on":"")})); }
    const cur=state.step===l;
    strand.appendChild(h("div",{class:"node"+(done.includes(l)?" on":"")+(cur?" cur":""),title:LABELS[l]}));
  });
  return h("div",{class:"top"},[
    h("div",{class:"brand"},[
      h("div",{class:"logo",html:'MEINE <b>FINANZ</b><i>CLOUD</i>'}),
      h("div",{class:"pts num"},[points()+" Pkt"])
    ]),
    strand
  ]);
}

function blockNav(current){
  const blocks=[["cloud","Cloud"],["ki","Auswertung"],["termin","Termin"],["empfehlung","Referenz"]];
  const wrap=h("div",{style:"display:flex;gap:6px;margin-bottom:16px"});
  blocks.forEach(([step,label])=>{
    const on=current===step;
    const b=h("button",{style:"flex:1;padding:8px 4px;border-radius:9px;font-size:12px;line-height:1.1;font-weight:"+(on?"700":"500")+";cursor:pointer;transition:all .15s;border:1px solid "+(on?"var(--cloud)":"var(--line)")+";background:"+(on?"rgba(46,155,240,.14)":"transparent")+";color:"+(on?"var(--cloud)":"var(--muted)")},[label]);
    if(!on) b.addEventListener("click",()=>go(step));
    wrap.appendChild(b);
  });
  return wrap;
}

function partnerChart(monthly){
  const n=12, gap=5, W=300, H=120, baseY=H-18, bw=(W-(n-1)*gap)/n;
  const maxFrac=1;
  let s='';
  for(let m=1;m<=n;m++){
    const frac=m/n, bh=Math.max(3,(H-30)*frac/maxFrac), x=(m-1)*(bw+gap), y=baseY-bh;
    const last=m===n;
    s+='<rect x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+bh.toFixed(1)+'" rx="2" fill="'+(last?"var(--gold)":"url(#pg)")+'"/>';
  }
  [1,6,12].forEach(m=>{ const x=(m-1)*(bw+gap)+bw/2; s+='<text x="'+x.toFixed(1)+'" y="'+(H-4)+'" text-anchor="middle" fill="#9fb3d6" style="font-family:Inter;font-size:9px">M'+m+'</text>'; });
  return '<svg width="100%" viewBox="0 0 '+W+' '+H+'"><defs><linearGradient id="pg" x1="0" y1="1" x2="0" y2="0"><stop offset="0" stop-color="#2e9bf0"/><stop offset="1" stop-color="#3fe0c7"/></linearGradient></defs>'+s+'</svg>';
}

function levelShell(level,emoji,title,sub,fields,resultFn){
  const n=LEVELS.indexOf(level)+1;
  if(!state.levelOpen) state.levelOpen={};
  const res=h("div",{class:"res"});
  const lineEl=h("span",{style:"font-size:13.5px"});
  const chev=h("span",{style:"color:var(--cloud);font-weight:700;font-size:16px;margin-left:10px"});
  const toggle=h("div",{class:"card",style:"cursor:pointer;display:flex;justify-content:space-between;align-items:center"},[ lineEl, chev ]);
  const setOpen=o=>{ state.levelOpen[level]=o; res.style.display=o?"block":"none"; chev.textContent=o?"▾":"▸"; };
  const refreshRes=()=>{
    const cc=calc();
    const p=bereichPotenzial(level,cc);
    res.innerHTML=(p?('<div class="rh">Heute vs. möglich</div>'+potenzialSVG(p)+'<div style="height:14px"></div>'):'')+resultFn(cc);
    const cov=cc.cov?cc.cov[level]:null;
    lineEl.innerHTML=(cov!=null)
      ? '<b style="font-family:Space Grotesk">Ihr Stand: ~'+Math.round(cov)+' %</b> <span style="color:var(--muted)">– tippen für Details</span>'
      : '<b style="font-family:Space Grotesk">Ihr Ergebnis</b> <span style="color:var(--muted)">– tippen für Details</span>';
  };
  const card=h("div",{class:"card"});
  fields(card, refreshRes);
  refreshRes();
  toggle.addEventListener("click",()=>setOpen(!state.levelOpen[level]));
  setOpen(!!state.levelOpen[level]);
  const pts=h("div",{class:"ptsgain"});
  const updatePts=()=>{ pts.textContent="+ "+calc().scores[level]+" Punkte für "+LABELS[level]; };
  updatePts();
  // Punkte zusätzlich bei jeder Eingabe aktualisieren
  card.addEventListener("input",updatePts);
  card.addEventListener("click",updatePts);

function potenzialSVG(p){
  const covPct=clamp(p.covPct,0,100), gapPct=100-covPct;
  const W=320, barY=30, barH=26, r=8;
  const covW=W*covPct/100, gapW=W-covW;
  let s="";
  s+='<text x="2" y="16" fill="#3fe0c7" style="font-family:Space Grotesk;font-weight:600;font-size:10px;letter-spacing:.06em">'+p.left+'</text>';
  s+='<text x="'+(W-2)+'" y="16" text-anchor="end" fill="#f6b43c" style="font-family:Space Grotesk;font-weight:600;font-size:10px;letter-spacing:.06em">'+p.right+'</text>';
  s+='<rect x="0" y="'+barY+'" width="'+W+'" height="'+barH+'" rx="'+r+'" fill="rgba(246,180,60,.20)"/>';
  if(covW>0) s+='<rect x="0" y="'+barY+'" width="'+covW.toFixed(1)+'" height="'+barH+'" rx="'+r+'" fill="url(#rcov)"/>';
  if(covPct>=14) s+='<text x="'+(covW/2).toFixed(0)+'" y="'+(barY+barH/2+4)+'" text-anchor="middle" fill="#06122c" style="font-family:Space Grotesk;font-weight:700;font-size:13px">'+Math.round(covPct)+' %</text>';
  if(gapPct>=14) s+='<text x="'+(covW+gapW/2).toFixed(0)+'" y="'+(barY+barH/2+4)+'" text-anchor="middle" fill="#f6b43c" style="font-family:Space Grotesk;font-weight:700;font-size:13px">'+Math.round(gapPct)+' %</text>';
  s+='<text x="0" y="'+(barY+barH+20)+'" fill="#9fb3d6" style="font-family:Inter;font-size:10.5px">'+p.line+'</text>';
  return '<svg width="100%" viewBox="0 0 '+W+' '+(barY+barH+30)+'" style="margin-top:4px">'+
    '<defs><linearGradient id="rcov" x1="0" x2="1"><stop offset="0" stop-color="#2e9bf0"/><stop offset="1" stop-color="#3fe0c7"/></linearGradient></defs>'+s+'</svg>';
}

function bereichPotenzial(level,c){
  if(level==="familie" && state.kinder===0) return null;
  const cov=c.cov?c.cov[level]:null;
  if(cov==null) return null;
  if(level==="rente"){
    return { covPct:cov, left:"AUF KURS", right:"NOCH NÖTIG",
      line:"Nötiges Kapital ~"+eurK(c.renteKapital)+" · auf Kurs ~"+eurK(c.kapitalZukunft)+" · Lücke ~"+eur(c.renteLuecke)+"/Mon." };
  }
  if(level==="eigentum"){
    if(state.wohnstatus==="eigentum_frei")
      return { covPct:cov, left:"ERFÜLLT", right:"KAPITALANLAGE", line:"Eigenheim abbezahlt – Eigentum erfüllt. Nächster Schritt: Kapitalanlage." };
    if(state.wohnstatus==="eigentum_kredit")
      return { covPct:cov, left:"IM AUFBAU", right:"KAPITALANLAGE", line:"Sie bauen bereits Eigentum auf · zusätzlich möglich: Immobilie ~"+eurK(c.immoRahmen) };
    const neededEK=Math.max(1,(c.ekQuote||0.15)*c.immoRahmen);
    return { covPct:cov, left:"STARTBEREIT", right:"NOCH NÖTIG",
      line:"EK ~"+eur(state.eigenkapital)+" · empfohlen ~"+eurK(neededEK)+" ("+Math.round((c.ekQuote||0.15)*100)+" %) · Objekt ~"+eurK(c.immoRahmen) };
  }
  if(level==="vermoegen"){
    return { covPct:cov, left:"HEUTE", right:"AUFBAU",
      line:"Vermögen heute ~"+eurK(state.vermoegen)+" · Richtwert ~"+eurK(c.netto*12)+" (1 Jahreseinkommen)" };
  }
  if(level==="familie"){
    return { covPct:cov, left:"AUF KURS", right:"ES FEHLT",
      line:"Auf Kurs ~"+eurK(c.familieReached)+" · Ziel ~"+eurK(state.zielKapital) };
  }
  if(level==="absicherung"){
    return { covPct:cov, left:"HEUTE GESCHÜTZT", right:"UNGESCHÜTZT",
      line:"Arbeitskraft ~"+eurK(c.arbeitskraft)+" · Rücklagen ~"+c.ruecklagenMonate.toFixed(1)+" Mon." };
  }
  return null;
}

function impliedReturn(beitrag,jahre,ablauf){
  if(beitrag<=0||jahre<=0||ablauf<=0) return null;
  const f=p=>fvAnnuity(beitrag,p,jahre)-ablauf;
  let lo=-20,hi=20;
  if(f(lo)>0) return -20; if(f(hi)<0) return 20;
  for(let k=0;k<70;k++){ const m=(lo+hi)/2; if(f(m)>0) hi=m; else lo=m; }
  return (lo+hi)/2;
}

const VEHICLES=[
  {key:"basis", sk:"allocBasis", label:"Basisrente", color:"#3fe0c7"},
  {key:"etf", sk:"allocEtf", label:"ETF-Sparplan", color:"#2e9bf0"},
  {key:"tagesgeld", sk:"allocTagesgeld", label:"Tagesgeld", color:"#8aa0c8"},

  {key:"immo", sk:"allocImmo", label:"Immobilie (Vermietung)", color:"#7b6cf6"},

function effectFor(key,val){
  const H=Math.max(1, RETIRE_AGE - state.alter);
  if(val<=0) return "noch nichts zugeteilt";
  if(key==="basis")     return "Altersvorsorge + ~"+eur(Math.round(val*12*0.3))+" Steuervorteil/Jahr vom Staat";
  if(key==="etf")       return "~"+eurK(fvAnnuity(val,6,H))+" in "+H+" Jahren";
  if(key==="tagesgeld") return "Sicheres Polster: ~"+eurK(val*12)+" pro Jahr griffbereit";
  if(key==="gold")      return "~"+eurK(fvAnnuity(val,3,H))+" in "+H+" J., inflationsgeschützt";
  if(key==="immo")      return "vermietete Wohnung bis ~"+eurK(val*12/0.045)+" finanzierbar";
  return "";
}
function donutSVG(){
  const segs=VEHICLES.map(v=>({v:state[v.sk], c:v.color}));
  const sum=segs.reduce((s,x)=>s+x.v,0);
  const frei=Math.max(0,state.allocTotal-sum);
  const all=segs.slice(); if(frei>0) all.push({v:frei,c:"rgba(255,255,255,.10)"});
  const total=Math.max(sum+frei,1);
  const R=52, sw=18, C=2*Math.PI*R, cx=64, cy=64;
  let off=0, arcs="";
  all.forEach(s=>{
    if(s.v<=0) return;
    const len=C*(s.v/total);
    arcs+='<circle cx="'+cx+'" cy="'+cy+'" r="'+R+'" fill="none" stroke="'+s.c+'" stroke-width="'+sw+'" stroke-dasharray="'+len.toFixed(2)+' '+(C-len).toFixed(2)+'" stroke-dashoffset="'+(-off).toFixed(2)+'" transform="rotate(-90 '+cx+' '+cy+')"/>';
    off+=len;
  });
  return '<svg width="128" height="128" viewBox="0 0 128 128" style="display:block;margin:6px auto 0">'+arcs+
    '<text x="'+cx+'" y="'+(cy-1)+'" text-anchor="middle" fill="#eaf1fb" style="font-family:Space Grotesk;font-weight:700;font-size:18px">'+eur(sum)+'</text>'+
    '<text x="'+cx+'" y="'+(cy+15)+'" text-anchor="middle" fill="#9fb3d6" style="font-family:Inter;font-size:9px">verteilt</text></svg>';
}

    h("button",{class:"back",onClick:prev},["Zurück"])
  ]);
  setTimeout(()=>{
    const C=2*Math.PI*78, pct=clamp(c.total/500,0,1);
    const fg=document.getElementById("ringfg");
    if(fg){ fg.setAttribute("stroke-dasharray",C); fg.setAttribute("stroke-dashoffset",C); fg.style.transition="stroke-dashoffset 1.1s cubic-bezier(.2,.8,.2,1)"; requestAnimationFrame(()=>fg.setAttribute("stroke-dashoffset",C*(1-pct))); }
    const numEl=document.getElementById("ringnum");
    let start=null; const dur=1100;
    const tick=t=>{ if(!start)start=t; const p=clamp((t-start)/dur,0,1); const e=1-Math.pow(1-p,3); if(numEl) numEl.textContent=Math.round(c.total*e); if(p<1) requestAnimationFrame(tick); };
    requestAnimationFrame(tick);
  },30);
  return screen;

function naechsteTermine(count){
  const out=[], d=new Date(); d.setHours(0,0,0,0);
  while(out.length<count){ d.setDate(d.getDate()+1); const w=d.getDay(); if(w!==0&&w!==6) out.push(new Date(d)); }
  return out;
}
function fmtDatum(d){ return WD[d.getDay()]+" "+d.getDate()+"."+(d.getMonth()+1)+"."; }
function kanalLabel(v){ const f=TERMIN_KANAELE.find(k=>k[0]===v); return f?f[1]:"–"; }

  updateHint();
  confirm.addEventListener("click",()=>{
    if(!(t.thema&&t.kanal&&t.dateKey&&t.slot)){ updateHint(); toast("Bitte Auswahl vervollständigen"); return; }

  });

  return h("div",{class:"screen"},[
    blockNav("termin"),
    h("div",{class:"eyebrow"},["Kostenlos & unverbindlich"]),

    h("button",{class:"back",onClick:prev},["Zurück"])

  if(state.cloudOn&&!maxedInvites) inviteBtn.addEventListener("click",()=>{
    state.invites++;
    toast("Referenz gezählt · Bonus jetzt "+eur(referralBonus()));
    renderScreenKeepStep();
  });
  inviteCard.appendChild(h("div",{class:"row"},[inviteCount,inviteBtn]));

  const shareBtn=h("button",{class:"btn",style:"margin-top:6px",disabled:state.cloudOn?null:"true"},["Einladung teilen"]);
  if(!state.cloudOn) shareBtn.setAttribute("style","margin-top:6px;opacity:.45;cursor:not-allowed");
  if(state.cloudOn) shareBtn.addEventListener("click",async()=>{
    const txt="Ich nutze Meine FinanzCloud – richte sie ein und sichere dir "+eur(BONUS_CONFIG.friendGets)+" Startguthaben.";
    try{ if(navigator.share){ await navigator.share({title:"Meine FinanzCloud",text:txt}); } else { toast("Einladungslink kopiert"); } }catch(e){ toast("Einladungslink kopiert"); }
  });
  inviteCard.appendChild(shareBtn);
  inviteCard.appendChild(h("div",{class:"row"},[ h("span",{class:"rl",style:"font-size:12px;color:var(--muted)"},["Zählt, sobald die Person die FinanzCloud tatsächlich eingerichtet hat. QR-Code & App-Stores werden hier live eingebunden."]) ]));

  // Schritt 3: eigene Sofort-Boni
  const actionCard=h("div",{class:"card"});
  actionCard.appendChild(h("div",{class:"sublabel"},["Schritt 3"]));
  actionCard.appendChild(h("div",{style:"font-family:Space Grotesk;font-weight:700;font-size:16px;color:var(--txt)"},["Eigene Sofort-Boni"]));
  actionCard.appendChild(h("div",{class:"row"},[ h("span",{class:"rl",style:"font-size:12.5px;color:var(--muted)"},["Zusätzlich – sofort ausgezahlt."]) ]));
  BONUS_CONFIG.actions.forEach(a=>{
    const done=!!state.actionsDone[a.id];
    const labelBlock=h("span",{class:"rl",html:a.label+' <span style="color:var(--gold);font-weight:700;font-family:Space Grotesk">+'+eur(a.amount)+'</span>'});
    let right;
    if(done){
      right=h("button",{class:"mini done"},["✓ erledigt"]);
    } else if(a.url){
      right=h("a",{class:"mini",href:a.url,target:"_blank",rel:"noopener noreferrer",style:"text-decoration:none;display:inline-block"},["Vergleich starten →"]);
      right.addEventListener("click",()=>{ state.actionsDone[a.id]=true; toast("Vergleich geöffnet · +"+eur(a.amount)+" bei Abschluss"); setTimeout(()=>renderScreenKeepStep(),0); });
    } else {
      right=h("button",{class:"mini"},["Vergleich starten →"]);
      right.addEventListener("click",()=>{ state.actionsDone[a.id]=true; toast("+"+eur(a.amount)+" bei Abschluss"); renderScreenKeepStep(); });
    }
    actionCard.appendChild(h("div",{class:"row"},[ labelBlock, right ]));
  });

  // Weitergeben-Hinweis (einstufig)
  const passCard=h("div",{class:"card",style:"border-color:rgba(63,224,199,.3)"},[
    h("div",{style:"font-family:Space Grotesk;font-weight:700;font-size:14px;color:var(--pulse);margin-bottom:4px"},["Und das Beste: weitergeben"]),
    h("p",{style:"font-size:12.5px;color:#cdd9ee;line-height:1.45;margin:0"},["Ihre Eingeladenen bekommen genau dasselbe Angebot und können selbst Menschen einladen – jede:r sammelt den eigenen Bonus. So geben Sie den Vorteil einfach weiter."])
  ]);

  // Gesamt-Summe (alles zusammengezählt)
  const gesamt=(state.cloudOn?BONUS_CONFIG.start:0)+selfBonus()+referralBonus();
  const trow=(label,val)=>h("div",{class:"row"},[
    h("span",{class:"rl",style:"font-size:13px;color:var(--muted)"},[label]),
    h("span",{class:"ra"},[eur(val)])
  ]);
  const totalCard=h("div",{class:"card",style:"border-color:rgba(246,180,60,.4);background:rgba(246,180,60,.06)"},[
    h("div",{class:"sublabel",style:"color:var(--gold)"},["Gesamt gesichert"]),
    trow("Startguthaben", state.cloudOn?BONUS_CONFIG.start:0),
    trow("Sofort-Boni", selfBonus()),
    trow("Referenz-Bonus", referralBonus()),
    h("div",{style:"display:flex;justify-content:space-between;align-items:center;border-top:1px solid rgba(246,180,60,.3);margin-top:8px;padding-top:11px"},[
      h("span",{style:"font-family:Space Grotesk;font-weight:700;font-size:15px;color:var(--txt)"},["Gesamt"]),
      h("span",{style:"font-family:Space Grotesk;font-weight:700;font-size:25px;color:var(--gold)"},[eur(gesamt)])
    ])
  ]);

  const kids=[
    blockNav("empfehlung"),
    h("div",{class:"eyebrow"},["Referenzen lohnen sich"]),
    h("h2",{style:"font-size:26px"},["Bis zu "+eur(BONUS_CONFIG.maxBonus)+" sichern"]),
    h("p",{class:"lead"},["1 Referenz "+eur(50)+", 3 Referenzen "+eur(250)+", 5 Referenzen "+eur(500)+" – und jede:r Eingeladene erhält selbst "+eur(BONUS_CONFIG.friendGets)+" Startguthaben."]),
    bonusCard,
    startCard,
    inviteCard,
    actionCard,
    totalCard,
    passCard,
    h("button",{class:"btn gold",style:"margin-top:18px",onClick:()=>{ resetForReplay(); go("intro"); }},["Fertig – zurück zum Start"]),
    h("p",{class:"foot"},["Einstufig: Sie verdienen nur an Ihren eigenen direkten Referenzen, nicht an deren Referenzen. Beträge zentral konfigurierbar. Geldprämien fürs Empfehlen im Finanzvertrieb bitte vor dem Livegang durch eure Compliance/Recht prüfen lassen."])
  ];
  return h("div",{class:"screen"},kids);
}

function resetForReplay(){
  state.cloudOn=false; state.actionsDone={}; state.invites=0;
  state.docs=[]; state.docConsent=false;
  state.termin={ thema:"", kanal:"", datum:"", slot:"", bestaetigt:false };
  state.kiText=""; state.kiLoading=false;
}

/* ===================== RENDER ===================== */
function currentScreen(){
  switch(state.step){
    case "intro": return screenIntro();
    case "typ": return screenTyp();
    case "basis": return screenBasis();
    case "rente": return screenRente();
    case "eigentum": return screenEigentum();
    case "vermoegen": return screenVermoegen();
    case "familie": return screenFamilie();
    case "absicherung": return screenAbsicherung();
    case "auswertung": return screenAuswertung();
    case "steuer": return screenSteuer();
    case "auto": return screenAuto();
    case "partner": return screenPartner();
    case "lead": return screenLead();
    case "ki": return screenKi();
    case "cloud": return screenCloud();
    case "termin": return screenTermin();
    case "empfehlung": return screenEmpfehlung();
    default: return screenIntro();
  }
}
function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  if(state.step!=="intro") app.appendChild(header());
  app.appendChild(currentScreen());
}
// Neu rendern, ohne den Schritt zu wechseln (z. B. nach Bonus-Klick)
function renderScreenKeepStep(){ render(); }

render();
</script>
</body>
</html>
